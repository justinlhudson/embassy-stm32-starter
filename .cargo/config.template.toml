## config.toml template for MCU configuration
# Managed by setup script
#
# Supported boards:
#   - STM32F446RE Nucleo-64
#   - STM32F413ZH Nucleo-144
#   - WWZMDiB STM32F103C8T6 Blue Pill


[target.'cfg(all(target_arch = "arm", target_os = "none"))']
linker = "arm-none-eabi-gcc"
runner = [
  "probe-rs",
  "run",
  "--chip",
  "{{CHIP_NAME}}",        # e.g. STM32F446RE, STM32F413ZH, STM32F103C8T6
  "--catch-hardfault",
  "--catch-reset",
  "--rtt-scan-memory",
  "--log-format=oneline",
]

rustflags = [
  "-C",
  "linker=flip-link",   # use flip-link as linker
  "-C",
  "link-arg=-Tlink.x",  # linker script, linker.x
  "-C",
  "link-arg=-Tdefmt.x", # for defmt support
  "-C",
  "link-arg=--nmagic",  # avoids page alignment
]

[env]
DEFMT_LOG = "trace"


# Target triple is set by setup script for each board:
#   - thumbv7em-none-eabihf (F4/F413)
#   - thumbv7m-none-eabi    (F103/Blue Pill)
[build]
target = "{{TARGET_MCU}}"

[alias]
cb = "clean"
bx = "build --bin"
start = "run --bin"
tests = "test --test integration"
